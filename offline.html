<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090b10" />
  <title>Offline | JoviGroove</title>
  <style>
    :root {
      --bg: #090b10;
      --panel: #141b26;
      --text: #eef2ff;
      --muted: #a5b1cb;
      --gold: #f3b33d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(243,179,61,0.18), transparent 30%), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p { margin: 0 0 14px; color: var(--muted); }
    a {
      display: inline-block;
      margin-top: 6px;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      background: linear-gradient(135deg, var(--gold), #ffcb6b);
      color: #111;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You're offline</h1>
    <p>This app is installed and still works with cached content. Reconnect to load new updates and external links.</p>
    <a href="index.html">Open Cached Home</a>
  </main>
</body>
</html>
